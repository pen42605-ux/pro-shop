<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>專屬代理通道 · SMOKE SHOP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body data-vip-home="1" class="vip-landing vip-home2">
    <a class="skip" href="#main">主要內容</a>
    <header class="topbar topbar--ghost">
      <div class="topbar-inner">
        <a href="index.html" class="logo" aria-current="page">
          <span class="logo-mark" aria-hidden="true"></span>
          <span>SMOKE SHOP</span>
        </a>
        <a class="btn-outline btn-sm" href="admin-login.html">後台</a>
      </div>
    </header>
    <main id="main" class="page vip-home2-page">
      <div class="vip-home2-shell">
        <div class="vip-home2-card is-vip-reveal">
          <h1 class="vip-home2-title">SMOKE SHOP</h1>
          <p class="vip-home2-sub">輸入代理名後，享受專屬會員價格</p>

          <p class="vip-home2-label">
            <span class="vip-home2-label__tag" aria-hidden="true">🏷</span>
            綁定您的專屬代理
          </p>

          <form id="form-verify" class="vip-home2-row" novalidate>
            <span class="vip-home2-row__icon" aria-hidden="true">🏷</span>
            <input
              id="agent-input"
              class="vip-home2-input"
              type="text"
              autocomplete="off"
              placeholder="請輸入代理名..."
              required
            />
            <button type="submit" id="btn-verify" class="vip-home2-btn-verify">驗證</button>
            <button type="button" id="btn-reset" class="vip-home2-btn-reset" hidden>重新輸入</button>
          </form>

          <section id="verify-success" class="vip-verify-card" hidden aria-live="polite">
            <p class="vip-verify-card__head">
              <span class="vip-verify-card__check" aria-hidden="true">✓</span>
              代理名驗證成功
            </p>
            <div class="vip-verify-card__body">
              <div class="vip-verify-card__avatar" aria-hidden="true">
                <svg viewBox="0 0 48 48" width="52" height="52"><circle cx="24" cy="18" r="8" fill="currentColor" opacity=".6"/><path d="M8 42c0-8 7-14 16-14s16 6 16 14" fill="currentColor" opacity=".55"/></svg>
              </div>
              <p class="vip-verify-card__name" id="agent-display">—</p>
            </div>
          </section>

          <button type="button" id="btn-line" class="btn-line-gold is-disabled" disabled>
            <span class="btn-line-gold__icon" aria-hidden="true">
              <svg viewBox="0 0 32 32" width="22" height="22" aria-hidden="true">
                <rect x="2" y="4" width="28" height="22" rx="6" fill="#06c755"/>
                <path fill="#fff" d="M10.87 17.2H7.7a.3.3 0 0 1-.3-.3v-5.36a.3.3 0 0 1 .3-.3h.8a.3.3 0 0 1 .3.3v4.26h2.07a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3Zm2.2-.3a.3.3 0 0 1-.3.3h-.8a.3.3 0 0 1-.3-.3v-5.36a.3.3 0 0 1 .3-.3h.8a.3.3 0 0 1 .3.3v5.36Zm5.98 0a.3.3 0 0 1-.3.3h-.8l-2.48-3.34v3.14a.3.3 0 0 1-.3.3h-.8a.3.3 0 0 1-.3-.3v-5.36a.3.3 0 0 1 .3-.3h.8l2.48 3.34v-3.14a.3.3 0 0 1 .3-.3h.8a.3.3 0 0 1 .3.3v5.36Zm4.8-4.26h-2.07v.8h2.07a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3h-2.07v.85h2.07a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3h-3.17a.3.3 0 0 1-.3-.3v-5.35a.3.3 0 0 1 .3-.3h3.17a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3Z"/>
              </svg>
            </span>
            <span id="btn-line-label">請先驗證代理人</span>
          </button>

          <hr class="vip-home2-hr" />

          <ul class="vip-home2-feats" aria-label="會員權益">
            <li class="vip-home2-feat">
              <span class="vip-home2-feat__icon" aria-hidden="true">🛒</span>
              <span class="vip-home2-feat__text">便捷購物</span>
            </li>
            <li class="vip-home2-feat">
              <span class="vip-home2-feat__icon" aria-hidden="true">🚀</span>
              <span class="vip-home2-feat__text">快速到貨</span>
            </li>
            <li class="vip-home2-feat">
              <span class="vip-home2-feat__icon" aria-hidden="true">🧑‍💼</span>
              <span class="vip-home2-feat__text">24H客服</span>
            </li>
          </ul>
        </div>

        <p class="vip-home2-foot">
          <a href="admin-login.html">管理後台</a>
        </p>
      </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="js/ux.js"></script>
    <script src="js/vip-landing.js"></script>
    <script>
      (function () {
        'use strict';

        function $(id) { return document.getElementById(id); }
        function escHtml(s) {
          return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        var form = $('form-verify');
        var input = $('agent-input');
        var btnVerify = $('btn-verify');
        var btnReset = $('btn-reset');
        var successBox = $('verify-success');
        var agentDisplay = $('agent-display');
        var btnLine = $('btn-line');
        var btnLineLabel = $('btn-line-label');

        function setVerifiedState(agentName, agentCode) {
          input.value = agentName || agentCode;
          input.readOnly = true;
          input.classList.add('is-verified');
          btnVerify.hidden = true;
          btnReset.hidden = false;
          agentDisplay.textContent = agentName || agentCode;
          successBox.hidden = false;
          btnLine.disabled = false;
          btnLine.classList.remove('is-disabled');
          btnLineLabel.textContent = 'LINE 快速註冊';
          document.body.classList.add('is-agent-verified');
        }

        function setUnverifiedState() {
          input.value = '';
          input.readOnly = false;
          input.classList.remove('is-verified');
          btnVerify.hidden = false;
          btnReset.hidden = true;
          successBox.hidden = true;
          btnLine.disabled = true;
          btnLine.classList.add('is-disabled');
          btnLineLabel.textContent = '請先驗證代理人';
          document.body.classList.remove('is-agent-verified');
          try { input.focus(); } catch (e) {}
        }

        try {
          var existing = VIPStore.getAgent();
          if (existing && existing.code) {
            setVerifiedState(existing.name, existing.code);
          }
        } catch (e) {}

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var raw = input.value;
          var ag = null;
          try { ag = VIPStore.resolveAgentForLogin(raw); } catch (err) {}
          if (!ag) {
            Swal.fire({
              icon: 'error',
              title: '查無此代理名',
              text: '請向管理員確認有效代碼。',
              confirmButtonText: '好的',
            });
            return;
          }
          try { VIPStore.setAgent({ code: ag.code, name: ag.name }); } catch (err) {}
          setVerifiedState(ag.name, ag.code);
        });

        btnReset.addEventListener('click', function () {
          try { VIPStore.clearAgent(); } catch (e) {}
          setUnverifiedState();
        });

        btnLine.addEventListener('click', function () {
          if (btnLine.disabled) return;
          var ag = null;
          try { ag = VIPStore.getAgent(); } catch (e) {}
          if (!ag || !ag.code) {
            Swal.fire({ icon: 'warning', title: '請先驗證代理', confirmButtonText: '好的' });
            return;
          }
          var result = VIPStore.completePortalLogin(ag.code);
          if (!result.ok) {
            Swal.fire({ icon: 'error', title: '登入失敗', text: result.error || '', confirmButtonText: '好的' });
            return;
          }
          try {
            var latest = VIPStore.getAgent();
            if (latest && latest.user) {
              latest.user.displayName = 'LINE 會員 ' + Math.floor(Math.random() * 900 + 100);
              VIPStore.setAgent(latest);
            }
            localStorage.setItem('vip', 'true');
            localStorage.setItem('role', 'line');
          } catch (err) {}
          location.href = './shop.html';
        });
      })();
    </script>
  </body>
</html>
