<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>會員登入 · VIP BOUTIQUE</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body class="vip-landing" style="min-height: 100vh">
    <a class="skip" href="#main">主要內容</a>
    <header class="topbar">
      <div class="topbar-inner">
        <a href="shop.html" class="logo"><span class="logo-mark" aria-hidden="true"></span><span>VIP BOUTIQUE</span></a>
        <a class="btn-outline btn-sm" href="index.html">代理頁</a>
      </div>
    </header>
    <main id="main" class="page">
      <div class="center vip-landing-inner">
        <header class="vip-hero is-vip-reveal">
          <p class="vip-hero__badge">限會員可見</p>
          <h1 class="vip-hero__title">會員登入</h1>
          <p class="vip-hero__sub">請輸入代理碼（須在系統代理清單內，示範：<strong>GOLD</strong>）</p>
        </header>
        <div class="card vip-glass-card is-vip-reveal">
          <form id="form-login" novalidate>
            <div class="field">
              <label for="agent-code">代理碼</label>
              <input id="agent-code" class="input" type="text" autocomplete="off" placeholder="GOLD" required />
            </div>
            <button type="submit" class="btn-gold" style="width: 100%; margin-top: 0.5rem">登入並進入商城</button>
          </form>
        </div>
        <nav class="footer-nav"><a href="index.html">返回代理驗證</a></nav>
      </div>
    </main>
    <script src="js/storage.js"></script>
    <script src="js/vip-landing.js"></script>
    <script>
      (function () {
        'use strict';

        console.log('[login] page load');

        try {
          if (localStorage.getItem('vip') === 'true') {
            console.log('[login] already vip → shop.html');
            VIPStore.bootstrapVipPortalSession();
            location.replace('shop.html');
            return;
          }
        } catch (e) {
          console.error('[login] localStorage', e);
        }

        document.getElementById('form-login').addEventListener('submit', function (e) {
          e.preventDefault();
          var raw = document.getElementById('agent-code').value;
          console.log('[login] submit', raw);

          var result = VIPStore.completePortalLogin(raw);
          if (!result.ok) {
            alert(result.error || '登入失敗');
            return;
          }

          localStorage.setItem('vip', 'true');
          console.log('[login] ok → shop.html');
          location.href = './shop.html';
        });
      })();
    </script>
  </body>
</html>
