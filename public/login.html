<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>會員登入 · VIP BOUTIQUE</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body class="vip-landing" style="min-height: 100vh">
    <a class="skip" href="#main">主要內容</a>
    <header class="topbar">
      <div class="topbar-inner">
        <a href="shop.html" class="logo"><span class="logo-mark" aria-hidden="true"></span><span>VIP BOUTIQUE</span></a>
        <a class="btn-outline btn-sm" href="index.html">代理頁</a>
      </div>
    </header>
    <main id="main" class="page">
      <div class="center vip-landing-inner">
        <header class="vip-hero is-vip-reveal">
          <p class="vip-hero__badge">限會員可見</p>
          <h1 class="vip-hero__title">會員登入</h1>
          <p class="vip-hero__sub">請輸入代理碼（須在系統代理清單內，示範：<strong>GOLD</strong>）</p>
        </header>
        <div class="card vip-glass-card is-vip-reveal">
          <button type="button" class="btn-line-gold" id="btn-line" style="width: 100%">
            <span class="btn-line-gold__icon" aria-hidden="true">
              <svg viewBox="0 0 32 32" width="22" height="22" aria-hidden="true">
                <path fill="currentColor" d="M16 3C8.27 3 2 7.97 2 14.08c0 5.48 4.92 10.07 11.56 10.94.45.1 1.06.3 1.22.68.14.35.09.89.04 1.25l-.2 1.18c-.06.35-.28 1.37 1.2.75 1.48-.63 7.97-4.7 10.87-8.05C28.76 18.6 30 16.47 30 14.08 30 7.97 23.73 3 16 3Zm-5.13 14.2H7.7a.3.3 0 0 1-.3-.3v-5.36a.3.3 0 0 1 .3-.3h.8a.3.3 0 0 1 .3.3v4.26h2.07a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3Zm2.2-.3a.3.3 0 0 1-.3.3h-.8a.3.3 0 0 1-.3-.3v-5.36a.3.3 0 0 1 .3-.3h.8a.3.3 0 0 1 .3.3v5.36Zm5.98 0a.3.3 0 0 1-.3.3h-.8a.3.3 0 0 1-.24-.12l-2.46-3.32v3.14a.3.3 0 0 1-.3.3h-.8a.3.3 0 0 1-.3-.3v-5.36a.3.3 0 0 1 .3-.3h.8l.02.01.02.01h.01l.02.02h.01l.02.02 2.46 3.32v-3.08a.3.3 0 0 1 .3-.3h.8a.3.3 0 0 1 .3.3v5.36Zm4.8-4.26h-2.07v.8h2.07a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3h-2.07v.85h2.07a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3h-3.17a.3.3 0 0 1-.3-.3v-5.35a.3.3 0 0 1 .3-.3h3.17a.3.3 0 0 1 .3.3v.8a.3.3 0 0 1-.3.3Z"/>
              </svg>
            </span>
            <span>使用 LINE 一鍵登入</span>
          </button>
          <div class="vip-divider" role="separator" aria-label="或"><span>或</span></div>
          <form id="form-login" novalidate>
            <div class="field">
              <label for="agent-code">代理碼</label>
              <input id="agent-code" class="input" type="text" autocomplete="off" placeholder="GOLD" required />
            </div>
            <button type="submit" class="btn-gold" style="width: 100%; margin-top: 0.5rem">登入並進入商城</button>
          </form>
        </div>
        <nav class="footer-nav"><a href="index.html">返回代理驗證</a></nav>
      </div>
    </main>
    <script src="js/storage.js"></script>
    <script src="js/vip-landing.js"></script>
    <script>
      (function () {
        'use strict';

        console.log('[login] page load');

        try {
          if (localStorage.getItem('vip') === 'true') {
            console.log('[login] already vip → shop.html');
            VIPStore.bootstrapVipPortalSession();
            location.replace('shop.html');
            return;
          }
        } catch (e) {
          console.error('[login] localStorage', e);
        }

        document.getElementById('form-login').addEventListener('submit', function (e) {
          e.preventDefault();
          var raw = document.getElementById('agent-code').value;
          console.log('[login] submit', raw);

          var result = VIPStore.completePortalLogin(raw);
          if (!result.ok) {
            alert(result.error || '登入失敗');
            return;
          }

          localStorage.setItem('vip', 'true');
          console.log('[login] ok → shop.html');
          location.href = './shop.html';
        });

        document.getElementById('btn-line').addEventListener('click', function () {
          console.log('[login] LINE click');
          var result = VIPStore.completePortalLogin('GOLD');
          if (!result.ok) {
            alert(result.error || 'LINE 登入失敗');
            return;
          }
          try {
            var ag = VIPStore.getAgent();
            if (ag && ag.user) {
              ag.user.displayName = 'LINE 會員 ' + Math.floor(Math.random() * 900 + 100);
              VIPStore.setAgent(ag);
            }
            localStorage.setItem('vip', 'true');
            localStorage.setItem('role', 'line');
          } catch (err) {
            console.error('[login] LINE storage err', err);
          }
          location.href = './shop.html';
        });
      })();
    </script>
  </body>
</html>
