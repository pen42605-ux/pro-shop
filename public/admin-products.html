<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>商品管理 · VIP Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <style>
      .admin-prod-thumb {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid rgba(212, 175, 55, 0.25);
        background: #111;
      }
      .admin-prod-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .admin-form-grid {
        display: grid;
        gap: 0.85rem;
      }
      @media (min-width: 560px) {
        .admin-form-grid--2 {
          grid-template-columns: 1fr 1fr;
        }
      }
      .admin-img-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .admin-img-tile {
        position: relative;
        width: 72px;
        height: 72px;
      }
      .admin-img-tile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .admin-img-tile button {
        position: absolute;
        top: -6px;
        right: -6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: none;
        background: #c62828;
        color: #fff;
        font-size: 0.75rem;
        line-height: 1;
        cursor: pointer;
      }
      .admin-opt-row {
        display: grid;
        gap: 0.4rem;
        margin-bottom: 0.65rem;
        padding: 0.65rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.25);
      }
      .admin-var-table input {
        width: 100%;
        max-width: 120px;
        padding: 0.35rem 0.45rem;
        font-size: 0.82rem;
      }
      #product-modal {
        z-index: 10070;
      }
      #product-modal .admin-modal__panel {
        width: min(720px, 100%);
        max-height: min(92dvh, 900px);
      }
    </style>
  </head>
  <body class="admin-body">
    <a class="skip" href="#main">主要內容</a>
    <div class="admin-app">
      <aside class="admin-sidebar" aria-label="後台選單">
        <div class="admin-sidebar__brand">
          <span class="admin-sidebar__brand-mark" aria-hidden="true">◆</span>
          <span class="admin-sidebar__brand-text">VIP Admin</span>
        </div>
        <nav class="admin-sidebar__nav">
          <a href="admin.html" data-admin-perm="dashboard"><span class="admin-sidebar__icon" aria-hidden="true">▣</span><span>儀表板</span></a>
          <a href="admin-users.html" data-admin-perm="users"><span class="admin-sidebar__icon" aria-hidden="true">👤</span><span>用戶</span></a>
          <a href="admin-products.html" aria-current="page" data-admin-perm="products"
            ><span class="admin-sidebar__icon" aria-hidden="true">🛍</span><span>商品</span></a
          >
          <a href="admin-orders.html" data-admin-perm="orders"><span class="admin-sidebar__icon" aria-hidden="true">📦</span><span>訂單</span></a>
          <a href="admin-admins.html" data-super-only><span class="admin-sidebar__icon" aria-hidden="true">⚙</span><span>管理者</span></a>
        </nav>
        <div class="admin-sidebar__foot">
          <button type="button" class="btn-outline btn-sm" id="out">登出</button>
        </div>
      </aside>
      <main class="admin-content" id="main">
        <header class="admin-content__head">
          <h1 class="admin-content__title">商品管理</h1>
          <p class="admin-content__sub">資料鍵 <code>products</code> · 圖片以 base64 存於瀏覽器（容量有限，建議壓縮圖檔）。</p>
        </header>
        <div class="admin-toolbar">
          <button type="button" class="btn-gold btn-sm" id="btn-new">＋ 新增商品</button>
          <button type="button" class="btn-outline btn-sm" id="btn-manage-cats">分類管理</button>
        </div>
        <div id="cat-manager" class="admin-card" hidden style="padding: 1rem 1.1rem; margin-bottom: 1rem">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;margin-bottom:0.5rem">
            <h3 style="margin:0;font-size:0.95rem;color:#f5e6a8">分類管理</h3>
            <button type="button" class="btn-outline btn-sm" id="btn-cat-close">收起</button>
          </div>
          <p class="page-sub" style="margin:0 0 0.7rem;font-size:0.78rem">新增、改名或刪除分類。改名時會一併把所屬商品的分類更新。</p>
          <div style="display:flex;gap:0.4rem;margin-bottom:0.75rem;flex-wrap:wrap">
            <input type="text" id="cat-new-input" class="input" placeholder="新分類名稱" style="flex:1;min-width:200px" />
            <button type="button" class="btn-gold btn-sm" id="btn-cat-add">＋ 新增分類</button>
          </div>
          <div id="cat-list" style="display:flex;flex-direction:column;gap:0.4rem"></div>
        </div>
        <div class="admin-table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width: 64px">圖</th>
                <th>名稱</th>
                <th>售價</th>
                <th>分類</th>
                <th>狀態</th>
                <th style="min-width: 200px">操作</th>
              </tr>
            </thead>
            <tbody id="tb"></tbody>
          </table>
        </div>
      </main>
    </div>

    <div id="product-modal" class="admin-modal" hidden role="dialog" aria-modal="true" aria-labelledby="pm-title">
      <div class="admin-modal__backdrop" data-pm-close></div>
      <div class="admin-modal__panel">
        <button type="button" class="admin-modal__close" data-pm-close aria-label="關閉">×</button>
        <h2 id="pm-title" style="margin: 0 0 1rem; font-size: 1.15rem; color: #f5e6a8">編輯商品</h2>
        <form id="pm-form" class="admin-form-grid">
          <input type="hidden" id="pm-id" />
          <div class="field">
            <label for="pm-name">商品名稱 *</label>
            <input id="pm-name" class="input" required />
          </div>
          <div class="field" style="grid-column: 1 / -1">
            <label for="pm-desc">描述</label>
            <textarea id="pm-desc" class="input" rows="3" style="resize: vertical"></textarea>
          </div>
          <div class="admin-form-grid admin-form-grid--2" style="grid-column: 1 / -1">
            <div class="field">
              <label for="pm-cat">分類 *</label>
              <input id="pm-cat" class="input" list="pm-cat-list" required />
              <datalist id="pm-cat-list"></datalist>
            </div>
            <div class="field">
              <label for="pm-status">狀態</label>
              <select id="pm-status" class="input">
                <option value="active">上架 active</option>
                <option value="hidden">隱藏 hidden</option>
              </select>
            </div>
            <div class="field">
              <label for="pm-base">基準售價 *</label>
              <input id="pm-base" class="input" type="number" min="0" step="1" required />
            </div>
            <div class="field">
              <label for="pm-orig">原價</label>
              <input id="pm-orig" class="input" type="number" min="0" step="1" />
            </div>
          </div>

          <div class="field" style="grid-column: 1 / -1">
            <label>商品圖片（多選，base64）</label>
            <input type="file" id="pm-files" accept="image/*" multiple class="input" />
            <div id="pm-img-grid" class="admin-img-grid"></div>
          </div>

          <div style="grid-column: 1 / -1">
            <p style="margin: 0 0 0.5rem; font-size: 0.85rem; font-weight: 700; color: #f5e6a8">選項群組（例：口味、尺寸、顏色）</p>
            <p class="page-sub" style="margin: 0 0 0.65rem; font-size: 0.75rem">每列：選項名稱 + 值（用逗號分隔）。點「產生規格組合」後於下方設定每個組合的售價／庫存。</p>
            <div id="pm-opt-rows"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.35rem">
              <button type="button" class="btn-outline btn-sm" id="pm-add-opt">＋ 新增選項群組</button>
              <button type="button" class="btn-outline btn-sm" id="pm-preset-flavor">套用常用口味 (16)</button>
              <button type="button" class="btn-outline btn-sm" id="pm-preset-flavor-short">常用口味 (短版 6)</button>
              <button type="button" class="btn-outline btn-sm" id="pm-preset-color">套用顏色</button>
              <button type="button" class="btn-outline btn-sm" id="pm-preset-size">套用尺寸</button>
              <button type="button" class="btn-gold btn-sm" id="pm-gen-var" style="margin-left: auto">產生規格組合</button>
            </div>
          </div>

          <div style="grid-column: 1 / -1">
            <p style="margin: 0 0 0.5rem; font-size: 0.85rem; font-weight: 700; color: #f5e6a8">規格／庫存／價格</p>
            <div class="admin-table-wrap">
              <table class="admin-var-table">
                <thead>
                  <tr>
                    <th>組合</th>
                    <th>售價</th>
                    <th>庫存</th>
                  </tr>
                </thead>
                <tbody id="pm-var-body"></tbody>
              </table>
            </div>
          </div>

          <div class="admin-actions" style="grid-column: 1 / -1; margin-top: 0.5rem">
            <button type="submit" class="btn-gold">儲存商品</button>
            <button type="button" class="btn-outline" data-pm-close>取消</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/admin-nav.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="js/ux.js"></script>
    <script>
      (function () {
        if (!VIPStore.isAdmin()) {
          location.replace('admin-login.html');
          return;
        }
        if (!VIPStore.hasAdminPermission('products')) {
          VIPStore.goToFallbackAdminPage();
          return;
        }
        ProductCatalog.seedFromMockIfEmpty();

        document.getElementById('out').addEventListener('click', function () {
          VIPStore.adminLogout();
          location.href = 'admin-login.html';
        });

        var tb = document.getElementById('tb');
        var modal = document.getElementById('product-modal');
        var pmImages = [];
        var pmVariations = [];

        function esc(s) {
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
        }
        function escAttr(s) {
          return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        }

        function openModal() {
          modal.hidden = false;
          modal.classList.add('is-open');
        }
        function closeModal() {
          modal.hidden = true;
          modal.classList.remove('is-open');
        }
        modal.querySelectorAll('[data-pm-close]').forEach(function (el) {
          el.addEventListener('click', closeModal);
        });

        var CAT_CUSTOM_KEY = 'vip_categories_custom';
        function getCustomCats() {
          try {
            var raw = localStorage.getItem(CAT_CUSTOM_KEY);
            var arr = raw ? JSON.parse(raw) : [];
            return Array.isArray(arr) ? arr.map(String) : [];
          } catch (e) { return []; }
        }
        function saveCustomCats(arr) {
          try {
            localStorage.setItem(CAT_CUSTOM_KEY, JSON.stringify(arr));
            window.dispatchEvent(new CustomEvent('vip-storage-change', { detail: { key: CAT_CUSTOM_KEY } }));
          } catch (e) {}
        }
        function getAllCats() {
          var inUse = ProductCatalog.categoriesInUse();
          var custom = getCustomCats();
          var set = {}, out = [];
          inUse.concat(custom).forEach(function (c) {
            var s = String(c || '').trim();
            if (!s || set[s]) return;
            set[s] = true; out.push(s);
          });
          return out.sort();
        }

        function fillCatList() {
          var dl = document.getElementById('pm-cat-list');
          dl.innerHTML = '';
          getAllCats().forEach(function (c) {
            var o = document.createElement('option');
            o.value = c;
            dl.appendChild(o);
          });
        }

        var catMgr = document.getElementById('cat-manager');
        document.getElementById('btn-manage-cats').addEventListener('click', function () {
          catMgr.hidden = !catMgr.hidden;
          if (!catMgr.hidden) renderCatManager();
        });
        document.getElementById('btn-cat-close').addEventListener('click', function () {
          catMgr.hidden = true;
        });

        function countProductsInCat(cat) {
          return VIPStore.getProducts().filter(function (p) {
            return String(p.category || '') === cat;
          }).length;
        }

        function renderCatManager() {
          var wrap = document.getElementById('cat-list');
          wrap.innerHTML = '';
          var cats = getAllCats();
          if (!cats.length) {
            wrap.innerHTML = '<p class="page-sub" style="margin:0;font-size:0.8rem">目前沒有任何分類。</p>';
            return;
          }
          cats.forEach(function (c) {
            var cnt = countProductsInCat(c);
            var row = document.createElement('div');
            row.style.cssText = 'display:flex;gap:0.4rem;align-items:center;padding:0.5rem 0.65rem;border:1px solid rgba(255,255,255,0.08);border-radius:10px;background:rgba(0,0,0,0.25);flex-wrap:wrap';
            row.innerHTML =
              '<strong style="flex:1;min-width:140px;color:#fff">' + esc(c) + '</strong>' +
              '<span class="page-sub" style="font-size:0.72rem;margin:0">' + cnt + ' 項商品</span>' +
              '<button type="button" class="btn-outline btn-sm" data-cat-act="rename" data-cat="' + escAttr(c) + '">改名</button>' +
              '<button type="button" class="btn-outline btn-sm" data-cat-act="delete" data-cat="' + escAttr(c) + '" style="border-color:rgba(200,80,80,0.5);color:#ffcdd2">刪除</button>';
            wrap.appendChild(row);
          });
          wrap.querySelectorAll('[data-cat-act]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var act = btn.getAttribute('data-cat-act');
              var c = btn.getAttribute('data-cat');
              if (act === 'rename') catRename(c);
              if (act === 'delete') catDelete(c);
            });
          });
        }

        function catRename(oldName) {
          Swal.fire({
            title: '改名分類',
            input: 'text',
            inputValue: oldName,
            inputLabel: '新分類名稱',
            showCancelButton: true,
            confirmButtonText: '儲存',
            cancelButtonText: '取消',
            inputValidator: function (val) {
              var v = String(val || '').trim();
              if (!v) return '名稱不可空白';
              if (v === oldName) return '名稱未變更';
              return null;
            },
          }).then(function (r) {
            if (!r.isConfirmed) return;
            var nv = String(r.value || '').trim();
            var list = VIPStore.getProducts();
            var touched = 0;
            list.forEach(function (p) {
              if (String(p.category || '') === oldName) {
                p.category = nv;
                touched += 1;
              }
            });
            VIPStore.saveProducts(list);
            var cust = getCustomCats().map(function (c) { return c === oldName ? nv : c; });
            saveCustomCats(cust);
            Swal.fire({ icon: 'success', title: '已改名', text: '更新 ' + touched + ' 個商品', toast: true, position: 'top-end', timer: 1800, showConfirmButton: false });
            renderCatManager();
            renderTable();
            fillCatList();
          });
        }

        function catDelete(name) {
          var cnt = countProductsInCat(name);
          if (cnt > 0) {
            Swal.fire({
              icon: 'warning',
              title: '無法刪除',
              html: '此分類還有 <strong>' + cnt + '</strong> 個商品。<br>請先把商品改到其他分類再刪除。',
            });
            return;
          }
          Swal.fire({
            title: '刪除分類？',
            text: name,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: '刪除',
            cancelButtonText: '取消',
          }).then(function (r) {
            if (!r.isConfirmed) return;
            var cust = getCustomCats().filter(function (c) { return c !== name; });
            saveCustomCats(cust);
            Swal.fire({ icon: 'success', title: '已刪除', toast: true, position: 'top-end', timer: 1400, showConfirmButton: false });
            renderCatManager();
            fillCatList();
          });
        }

        document.getElementById('btn-cat-add').addEventListener('click', function () {
          var inp = document.getElementById('cat-new-input');
          var v = String(inp.value || '').trim();
          if (!v) {
            Swal.fire({ icon: 'warning', title: '請輸入分類名稱' });
            return;
          }
          var all = getAllCats();
          if (all.indexOf(v) !== -1) {
            Swal.fire({ icon: 'info', title: '分類已存在', toast: true, position: 'top-end', timer: 1500, showConfirmButton: false });
            return;
          }
          var cust = getCustomCats();
          cust.push(v);
          saveCustomCats(cust);
          inp.value = '';
          Swal.fire({ icon: 'success', title: '已新增分類', toast: true, position: 'top-end', timer: 1500, showConfirmButton: false });
          renderCatManager();
          fillCatList();
        });

        function renderImgGrid() {
          var g = document.getElementById('pm-img-grid');
          g.innerHTML = '';
          pmImages.forEach(function (src, i) {
            var wrap = document.createElement('div');
            wrap.className = 'admin-img-tile';
            wrap.innerHTML = '<img src="' + escAttr(src) + '" alt="" /><button type="button" data-rm-img="' + i + '" aria-label="移除">×</button>';
            g.appendChild(wrap);
          });
          g.querySelectorAll('[data-rm-img]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var i = Number(btn.getAttribute('data-rm-img'));
              pmImages.splice(i, 1);
              renderImgGrid();
            });
          });
        }

        document.getElementById('pm-files').addEventListener('change', function () {
          var files = this.files;
          if (!files || !files.length) return;
          var i = 0;
          function next() {
            if (i >= files.length) {
              renderImgGrid();
              return;
            }
            var f = files[i++];
            if (!f.type.match(/^image\//)) return next();
            if (f.size > 900000) {
              Swal.fire({ icon: 'warning', title: '檔案略過', text: f.name + ' 超過約 900KB', timer: 2200, showConfirmButton: false });
              return next();
            }
            var rd = new FileReader();
            rd.onload = function () {
              pmImages.push(rd.result);
              next();
            };
            rd.onerror = next;
            rd.readAsDataURL(f);
          }
          next();
          this.value = '';
        });

        function addOptRow(name, valuesText) {
          var wrap = document.createElement('div');
          wrap.className = 'admin-opt-row';
          wrap.innerHTML =
            '<input type="text" class="input pm-opt-name" placeholder="選項名稱（例：口味）" value="' +
            escAttr(name || '') +
            '" />' +
            '<input type="text" class="input pm-opt-values" placeholder="值，逗號分隔（例：Mint,Mango,Grape）" value="' +
            escAttr(valuesText || '') +
            '" />' +
            '<button type="button" class="btn-outline btn-sm pm-opt-remove">移除此群組</button>';
          wrap.querySelector('.pm-opt-remove').addEventListener('click', function () {
            wrap.remove();
          });
          document.getElementById('pm-opt-rows').appendChild(wrap);
        }

        document.getElementById('pm-add-opt').addEventListener('click', function () {
          addOptRow('', '');
        });

        var FLAVORS_16 = [
          '芭樂', '葡萄', '西瓜', '哈密瓜', '北極冰', '可樂',
          '綠豆沙', '鐵觀音', '薄荷', '百香果', '草莓', '藍莓',
          '莓果', '蜜桃烏龍', '新荔枝', '茉莉花茶'
        ];
        var FLAVORS_6 = ['薄荷', '葡萄', '西瓜', '可樂', '草莓', '芭樂'];
        var COLORS = ['曜金', '曜黑', '午夜藍'];
        var SIZES = ['S', 'M', 'L'];

        function upsertOptRow(name, values) {
          var rows = document.querySelectorAll('#pm-opt-rows .admin-opt-row');
          var found = null;
          rows.forEach(function (row) {
            var n = row.querySelector('.pm-opt-name').value.trim();
            if (!found && n === name) found = row;
          });
          if (found) {
            found.querySelector('.pm-opt-values').value = values.join(', ');
          } else {
            addOptRow(name, values.join(', '));
          }
        }

        document.getElementById('pm-preset-flavor').addEventListener('click', function () {
          upsertOptRow('口味', FLAVORS_16);
        });
        document.getElementById('pm-preset-flavor-short').addEventListener('click', function () {
          upsertOptRow('口味', FLAVORS_6);
        });
        document.getElementById('pm-preset-color').addEventListener('click', function () {
          upsertOptRow('顏色', COLORS);
        });
        document.getElementById('pm-preset-size').addEventListener('click', function () {
          upsertOptRow('尺寸', SIZES);
        });

        function readOptionsFromForm() {
          var rows = document.querySelectorAll('#pm-opt-rows .admin-opt-row');
          var options = [];
          rows.forEach(function (row) {
            var n = row.querySelector('.pm-opt-name').value.trim();
            var vt = row.querySelector('.pm-opt-values').value;
            var values = vt
              .split(/[,，\n]/)
              .map(function (s) {
                return s.trim();
              })
              .filter(Boolean);
            if (n && values.length) options.push({ name: n, values: values });
          });
          return options;
        }

        function renderVarTable() {
          var body = document.getElementById('pm-var-body');
          body.innerHTML = '';
          pmVariations.forEach(function (v, idx) {
            var tr = document.createElement('tr');
            var comboStr = (v.combo && v.combo.length ? v.combo.join(' + ') : '（預設）');
            tr.innerHTML =
              '<td style="font-size:0.78rem">' +
              esc(comboStr) +
              '</td><td><input type="number" class="pm-v-price" min="0" step="1" data-i="' +
              idx +
              '" value="' +
              (Number(v.price) || 0) +
              '" /></td><td><input type="number" class="pm-v-stock" min="0" step="1" data-i="' +
              idx +
              '" value="' +
              (Number(v.stock) || 0) +
              '" /></td>';
            body.appendChild(tr);
          });
          body.querySelectorAll('.pm-v-price').forEach(function (inp) {
            inp.addEventListener('input', function () {
              var i = Number(inp.getAttribute('data-i'));
              pmVariations[i].price = Number(inp.value) || 0;
            });
          });
          body.querySelectorAll('.pm-v-stock').forEach(function (inp) {
            inp.addEventListener('input', function () {
              var i = Number(inp.getAttribute('data-i'));
              pmVariations[i].stock = Math.max(0, Math.floor(Number(inp.value)) || 0);
            });
          });
        }

        document.getElementById('pm-gen-var').addEventListener('click', function () {
          var options = readOptionsFromForm();
          var base = Number(document.getElementById('pm-base').value) || 0;
          var combos = ProductCatalog.cartesianOptionValues(options);
          if (!options.length) {
            pmVariations = [{ combo: [], price: base, stock: 0 }];
            renderVarTable();
            Swal.fire({ icon: 'info', title: '已建立單一規格', text: '未設定選項時使用一列規格。', timer: 1800, showConfirmButton: false });
            return;
          }
          if (!combos.length) {
            Swal.fire({ icon: 'warning', title: '請填完整選項值', text: '每個群組至少一個值。' });
            return;
          }
          var prevMap = {};
          pmVariations.forEach(function (v) {
            prevMap[JSON.stringify(v.combo || [])] = v;
          });
          pmVariations = combos.map(function (combo) {
            var prev = prevMap[JSON.stringify(combo)];
            return {
              combo: combo,
              price: prev ? prev.price : base,
              stock: prev ? prev.stock : 0,
            };
          });
          renderVarTable();
          Swal.fire({ icon: 'success', title: '已產生 ' + pmVariations.length + ' 組合', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
        });

        function loadProductIntoForm(p) {
          p = ProductCatalog.ensureProductShape(p) || {};
          document.getElementById('pm-id').value = p.id || '';
          document.getElementById('pm-name').value = p.name || '';
          document.getElementById('pm-desc').value = p.description || '';
          document.getElementById('pm-cat').value = p.category || '';
          document.getElementById('pm-status').value = p.status === 'hidden' ? 'hidden' : 'active';
          document.getElementById('pm-base').value = p.base_price != null ? p.base_price : '';
          document.getElementById('pm-orig').value = p.original_price != null ? p.original_price : '';
          pmImages = (p.images || []).slice();
          renderImgGrid();
          document.getElementById('pm-opt-rows').innerHTML = '';
          (p.options || []).forEach(function (o) {
            addOptRow(o.name, (o.values || []).join(', '));
          });
          pmVariations = (p.variations || []).map(function (v) {
            return {
              combo: (v.combo || []).slice(),
              price: Number(v.price) || 0,
              stock: Math.max(0, Math.floor(Number(v.stock)) || 0),
            };
          });
          if (!pmVariations.length) {
            pmVariations = [{ combo: [], price: Number(p.base_price) || 0, stock: 0 }];
          }
          renderVarTable();
          document.getElementById('pm-title').textContent = p.id ? '編輯商品' : '新增商品';
        }

        function renderTable() {
          tb.innerHTML = '';
          var list = VIPStore.getProducts().map(function (p) {
            return ProductCatalog.ensureProductShape(p);
          });
          if (!list.length) {
            tb.innerHTML = '<tr><td colspan="6" class="page-sub" style="padding:1.2rem;text-align:center">尚無商品，請新增或還原 mock 種子。</td></tr>';
            return;
          }
          list.forEach(function (p) {
            var img = (p.images && p.images[0]) || '';
            var st = (p.status || 'active') === 'active';
            var tr = document.createElement('tr');
            tr.innerHTML =
              '<td><img class="admin-prod-thumb" src="' +
              escAttr(img || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52"><rect fill="%23222" width="100%" height="100%"/></svg>') +
              '" alt="" /></td><td><strong>' +
              esc(p.name) +
              '</strong></td><td>' +
              esc(VIPStore.formatTWD(p.base_price)) +
              '</td><td>' +
              esc(p.category) +
              '</td><td><span class="ad-badge ' +
              (st ? 'ad-badge--completed' : 'ad-badge--pending') +
              '" style="' +
              (st ? '' : 'opacity:0.7') +
              '">' +
              esc(st ? 'active' : 'hidden') +
              '</span></td><td><div class="admin-prod-actions">' +
              '<button type="button" class="btn-outline btn-sm btn-ed" data-id="' +
              escAttr(p.id) +
              '">編輯</button>' +
              '<button type="button" class="btn-outline btn-sm btn-tog" data-id="' +
              escAttr(p.id) +
              '">' +
              (st ? '隱藏' : '上架') +
              '</button>' +
              '<button type="button" class="btn-outline btn-sm btn-del" data-id="' +
              escAttr(p.id) +
              '" style="border-color:rgba(200,80,80,0.5);color:#ffcdd2">刪除</button></div></td>';
            tb.appendChild(tr);
          });
        }

        tb.addEventListener('click', function (e) {
          var ed = e.target.closest('.btn-ed');
          var tog = e.target.closest('.btn-tog');
          var del = e.target.closest('.btn-del');
          var id = (ed || tog || del) && (ed || tog || del).getAttribute('data-id');
          if (!id) return;
          var list = VIPStore.getProducts();
          var p = list.find(function (x) {
            return x.id === id;
          });
          if (!p) return;

          if (ed) {
            fillCatList();
            loadProductIntoForm(p);
            openModal();
            return;
          }

          if (tog) {
            p.status = (p.status || 'active') === 'active' ? 'hidden' : 'active';
            VIPStore.saveProducts(list);
            Swal.fire({ icon: 'success', title: '已更新狀態', toast: true, position: 'top-end', timer: 1600, showConfirmButton: false });
            renderTable();
            return;
          }

          if (del) {
            Swal.fire({
              title: '刪除商品？',
              text: p.name,
              icon: 'warning',
              showCancelButton: true,
              confirmButtonText: '刪除',
              cancelButtonText: '取消',
              customClass: { popup: 'vip-swal-popup' },
            }).then(function (res) {
              if (!res.isConfirmed) return;
              VIPStore.saveProducts(
                list.filter(function (x) {
                  return x.id !== id;
                })
              );
              Swal.fire({ icon: 'success', title: '已刪除', toast: true, timer: 1800, showConfirmButton: false });
              renderTable();
            });
          }
        });

        document.getElementById('btn-new').addEventListener('click', function () {
          fillCatList();
          document.getElementById('pm-form').reset();
          document.getElementById('pm-opt-rows').innerHTML = '';
          addOptRow('口味', '');
          pmImages = [];
          renderImgGrid();
          document.getElementById('pm-id').value = '';
          document.getElementById('pm-base').value = '0';
          document.getElementById('pm-orig').value = '';
          pmVariations = [{ combo: [], price: 0, stock: 0 }];
          renderVarTable();
          document.getElementById('pm-title').textContent = '新增商品';
          openModal();
        });

        document.getElementById('pm-form').addEventListener('submit', function (e) {
          e.preventDefault();
          var id = document.getElementById('pm-id').value.trim() || ProductCatalog.nextId();
          var name = document.getElementById('pm-name').value.trim();
          var desc = document.getElementById('pm-desc').value.trim();
          var cat = document.getElementById('pm-cat').value.trim();
          var st = document.getElementById('pm-status').value;
          var base = Number(document.getElementById('pm-base').value);
          var orig = document.getElementById('pm-orig').value;
          if (!name || !cat || !Number.isFinite(base)) {
            Swal.fire({ icon: 'warning', title: '請填必填欄位' });
            return;
          }
          var options = readOptionsFromForm();
          if (!pmVariations.length) {
            Swal.fire({ icon: 'warning', title: '請設定規格', text: '使用「產生規格組合」或保留一列預設。' });
            return;
          }

          var product = ProductCatalog.ensureProductShape({
            id: id,
            name: name,
            description: desc,
            category: cat,
            base_price: base,
            original_price: orig === '' ? base : Number(orig),
            images: pmImages.slice(),
            options: options,
            variations: pmVariations.map(function (v) {
              return {
                combo: (v.combo || []).slice(),
                price: Number(v.price) || 0,
                stock: Math.max(0, Math.floor(Number(v.stock)) || 0),
              };
            }),
            status: st,
          });

          var all = VIPStore.getProducts().filter(function (x) {
            return x.id !== id;
          });
          all.push(product);
          VIPStore.saveProducts(all);
          closeModal();
          Swal.fire({
            icon: 'success',
            title: '已儲存',
            text: product.name,
            timer: 2000,
            showConfirmButton: false,
            customClass: { popup: 'vip-swal-popup' },
          });
          renderTable();
        });

        renderTable();
        window.addEventListener('vip-storage-change', function (e) {
          if (e.detail && e.detail.key === 'products') renderTable();
        });
      })();
    </script>
  </body>
</html>
